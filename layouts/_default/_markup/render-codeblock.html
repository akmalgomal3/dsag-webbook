{{- $lang := .Type -}}
{{- $code := .Inner -}}
<div class="code-block">
    <div class="code-header">
        <span class="code-lang">{{ $lang }}</span>
        <button class="copy-btn" aria-label="Copy code" data-clipboard-text="{{ $code }}">Copy</button>
    </div>
    <pre><code class="language-{{ $lang }}">{{ $code }}</code></pre>
</div>
{{- "" -}}
