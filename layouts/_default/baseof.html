<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}">
    <meta name="author" content="DSAG Contributors">
    <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
    <meta property="og:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
    <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}">
    <meta property="og:site_name" content="{{ .Site.Title }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ if .Title }}{{ .Title }}{{ else }}{{ .Site.Title }}{{ end }}">
    <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}">
    <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
    <link rel="icon" type="image/svg+xml" href="{{ "favicon.svg" | absURL }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YrqzHgFeOFAzwg81tL3saXQock3I42Tg4klyy" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqt+117bE1XvzvBimR8rDkH9b+OQhf+uvAUHiD6rTDgQ7Hbq1I9" crossorigin="anonymous"
        onload="renderMathInElement(document.body, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false}
            ]
        });"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Book",
      "name": "Modern Data Structures and Algorithms in Go",
      "description": "A comprehensive 60-chapter technical book on data structures and algorithms, implemented idiomatically in Go.",
      "author": {
        "@type": "Organization",
        "name": "DSAG Contributors"
      },
      "inLanguage": "en",
      "numberOfPages": 60,
      "educationalLevel": "Intermediate to Advanced",
      "genre": "Computer Science / Programming",
      "about": "Data structures, algorithms, Go programming"
    }
    </script>
    <script>
    (function() {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
</head>
<body>
    <div class="reading-progress" id="reading-progress"></div>

    {{ block "header" . }}
    <header class="site-header" id="site-header">
        <div class="header-inner">
            <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <a href="{{ .Site.BaseURL }}" class="site-logo">{{ .Site.Title }}</a>
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Search..." autocomplete="off">
                </div>
                <div id="search-results" class="search-results"></div>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="{{ "docs/" | absURL }}" {{ if eq .Section "docs" }}class="active"{{ end }}>Docs</a></li>
                    <li><button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button></li>
                </ul>
            </nav>
        </div>
    </header>
    {{ end }}

    <div class="page-wrapper">
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-nav">
                {{ partial "sidebar-content" . }}
            </nav>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <main id="main-content" class="main-content container">
            {{ block "content" . }}{{ end }}
        </main>
    </div>

    {{ block "footer" . }}
    <footer class="site-footer">
        <div class="header-inner">
            <p>&copy; {{ now.Year }} {{ .Site.Title }}. Built with Hugo.</p>
        </div>
    </footer>
    {{ end }}

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        Prism.highlightAll();

        // Enhance markdown code blocks (from Hugo Chroma) with copy button
        document.querySelectorAll('.highlight').forEach(function(hl) {
            if (hl.closest('.code-block')) return; // skip if already wrapped by prism shortcode
            
            var pre = hl.querySelector('pre');
            if (!pre) return;
            
            var codeBlock = document.createElement('div');
            codeBlock.className = 'code-block';
            
            var codeHeader = document.createElement('div');
            codeHeader.className = 'code-header';
            
            var langSpan = document.createElement('span');
            langSpan.className = 'code-lang';
            var codeEl = pre.querySelector('code');
            var lang = codeEl ? (codeEl.getAttribute('data-lang') || 'code') : 'code';
            langSpan.textContent = lang;
            
            var copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.setAttribute('aria-label', 'Copy code');
            copyBtn.textContent = 'Copy';
            
            codeHeader.appendChild(langSpan);
            codeHeader.appendChild(copyBtn);
            codeBlock.appendChild(codeHeader);
            
            hl.parentNode.insertBefore(codeBlock, hl);
            codeBlock.appendChild(hl);
            hl.style.borderRadius = '0 0 8px 8px';
            hl.style.margin = '0';
        });

        var clipboard = new ClipboardJS('.copy-btn', {
            text: function(trigger) {
                // If button has data-clipboard-text (render hook), use it
                if (trigger.hasAttribute('data-clipboard-text')) {
                    return trigger.getAttribute('data-clipboard-text');
                }
                // Otherwise fall back to finding the pre element (prism shortcode)
                var block = trigger.closest('.code-block');
                var pre = block.querySelector('pre');
                return pre ? pre.textContent : '';
            }
        });

        clipboard.on('success', function(e) {
            var btn = e.trigger;
            var originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 2000);
            e.clearSelection();
        });

        var toggle = document.getElementById('theme-toggle');
        var html = document.documentElement;

        function updateToggle() {
            var isDark = html.getAttribute('data-theme') === 'dark';
            toggle.querySelector('.icon-sun').style.display = isDark ? 'none' : 'inline';
            toggle.querySelector('.icon-moon').style.display = isDark ? 'inline' : 'none';
        }

        toggle.addEventListener('click', function() {
            var isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
            updateToggle();
        });

        updateToggle();

        var sidebarToggle = document.getElementById('sidebar-toggle');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebar-overlay');
        
        function closeSidebar() {
            sidebar.classList.remove('open');
        }
        
        function openSidebar() {
            sidebar.classList.add('open');
        }
        
        sidebarToggle.addEventListener('click', function() {
            if (sidebar.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });
        
        overlay.addEventListener('click', closeSidebar);

        if (localStorage.getItem('sidebar') === 'open') {
            openSidebar();
        }

        // Search functionality
        var searchInput = document.getElementById('search-input');
        var searchResults = document.getElementById('search-results');
        var searchIndex = null;
        var activeSearchIndex = -1;

        fetch('{{ "search.json" | absURL }}')
            .then(function(r) { return r.json(); })
            .then(function(data) { searchIndex = data; });

        function performSearch(query) {
            if (!searchIndex || !query) {
                searchResults.innerHTML = '';
                searchResults.style.display = 'none';
                activeSearchIndex = -1;
                return;
            }
            query = query.toLowerCase();
            var matches = [];
            for (var i = 0; i < searchIndex.length; i++) {
                var item = searchIndex[i];
                var score = 0;
                if (item.title.toLowerCase().indexOf(query) !== -1) score += 10;
                if (item.summary && item.summary.toLowerCase().indexOf(query) !== -1) score += 5;
                if (item.content && item.content.toLowerCase().indexOf(query) !== -1) score += 1;
                if (score > 0) {
                    matches.push({ item: item, score: score });
                }
            }
            matches.sort(function(a, b) { return b.score - a.score; });
            matches = matches.slice(0, 10);

            if (matches.length === 0) {
                searchResults.innerHTML = '<div class="search-no-results">No results</div>';
            } else {
                var html = '';
                for (var j = 0; j < matches.length; j++) {
                    var m = matches[j].item;
                    html += '<a href="' + m.permalink + '" class="search-result-item" data-index="' + j + '">' +
                        '<div class="search-result-title">' + m.title + '</div>' +
                        '<div class="search-result-summary">' + (m.summary || '').substring(0, 120) + '</div>' +
                        '</a>';
                }
                searchResults.innerHTML = html;
            }
            searchResults.style.display = 'block';
            activeSearchIndex = -1;
        }

        function updateSearchActive() {
            var items = searchResults.querySelectorAll('.search-result-item');
            items.forEach(function(item, idx) {
                if (idx === activeSearchIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        var searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
                performSearch(searchInput.value);
            }, 150);
        });

        searchInput.addEventListener('keydown', function(e) {
            var items = searchResults.querySelectorAll('.search-result-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (activeSearchIndex < items.length - 1) {
                    activeSearchIndex++;
                    updateSearchActive();
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (activeSearchIndex > 0) {
                    activeSearchIndex--;
                    updateSearchActive();
                }
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (activeSearchIndex >= 0 && items[activeSearchIndex]) {
                    window.location.href = items[activeSearchIndex].getAttribute('href');
                } else if (items.length > 0) {
                    window.location.href = items[0].getAttribute('href');
                }
            } else if (e.key === 'Escape') {
                searchResults.style.display = 'none';
                searchInput.blur();
                activeSearchIndex = -1;
            }
        });

        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
                activeSearchIndex = -1;
            }
        });

        // Header scroll shadow + reading progress bar
        var siteHeader = document.getElementById('site-header');
        var readingProgress = document.getElementById('reading-progress');
        var backToTop = document.getElementById('back-to-top');
        var scrollThrottle = null;

        function onScroll() {
            var scrollY = window.scrollY || window.pageYOffset;
            var docHeight = document.documentElement.scrollHeight - window.innerHeight;
            var progress = docHeight > 0 ? (scrollY / docHeight) * 100 : 0;

            if (readingProgress) {
                readingProgress.style.width = progress + '%';
            }

            if (siteHeader) {
                if (scrollY > 10) {
                    siteHeader.classList.add('scrolled');
                } else {
                    siteHeader.classList.remove('scrolled');
                }
            }

            if (backToTop) {
                if (scrollY > 400) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            }
        }

        window.addEventListener('scroll', function() {
            if (scrollThrottle) return;
            scrollThrottle = setTimeout(function() {
                scrollThrottle = null;
                onScroll();
            }, 16);
        });

        onScroll();

        // Back to top
        if (backToTop) {
            backToTop.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // Smooth anchor scroll offset (account for sticky header)
        document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
            anchor.addEventListener('click', function(e) {
                var targetId = anchor.getAttribute('href');
                if (targetId === '#') return;
                var target = document.querySelector(targetId);
                if (target) {
                    e.preventDefault();
                    var headerOffset = 80;
                    var elementPosition = target.getBoundingClientRect().top;
                    var offsetPosition = elementPosition + window.scrollY - headerOffset;
                    window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    history.pushState(null, null, targetId);
                }
            });
        });

        // Sidebar section collapse/expand
        document.querySelectorAll('.sidebar-section-toggle').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                var section = btn.closest('.sidebar-section');
                if (!section) return;
                var isExpanded = section.getAttribute('data-expanded') === 'true';
                var list = section.querySelector('.sidebar-list');
                var chevron = btn.querySelector('.sidebar-chevron');

                if (isExpanded) {
                    section.setAttribute('data-expanded', 'false');
                    if (list) list.style.display = 'none';
                    if (chevron) chevron.style.transform = 'rotate(0deg)';
                } else {
                    section.setAttribute('data-expanded', 'true');
                    if (list) list.style.display = '';
                    if (chevron) chevron.style.transform = 'rotate(180deg)';
                }

                // Persist preference per section
                var partTitle = section.getAttribute('data-part');
                if (partTitle) {
                    try {
                        var prefs = JSON.parse(sessionStorage.getItem('sidebar-prefs') || '{}');
                        prefs[partTitle] = !isExpanded;
                        sessionStorage.setItem('sidebar-prefs', JSON.stringify(prefs));
                    } catch (err) {}
                }
            });
        });

        // Restore sidebar preferences from sessionStorage
        document.querySelectorAll('.sidebar-section').forEach(function(section) {
            var partTitle = section.getAttribute('data-part');
            if (!partTitle) return;
            try {
                var prefs = JSON.parse(sessionStorage.getItem('sidebar-prefs') || '{}');
                if (prefs.hasOwnProperty(partTitle)) {
                    var shouldExpand = prefs[partTitle];
                    var list = section.querySelector('.sidebar-list');
                    var chevron = section.querySelector('.sidebar-chevron');
                    section.setAttribute('data-expanded', shouldExpand ? 'true' : 'false');
                    if (list) list.style.display = shouldExpand ? '' : 'none';
                    if (chevron) chevron.style.transform = shouldExpand ? 'rotate(180deg)' : 'rotate(0deg)';
                }
            } catch (err) {}
        });
    });
    </script>
</body>
</html>
